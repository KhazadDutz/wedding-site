<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portas de Durin</title>
    <link rel="stylesheet" href="css/opening.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>

    <!-- Menu (revelado quando a porta abre) -->
    <div id="behind-door">
        <div id="menu-scene">
            <img id="menu-image" src="images/menu/3gatesgandalfwithtook.png" alt="Moria">

            <!-- Botões de navegação -->
            <div id="menu-buttons">
                <a href="convite.html" class="menu-btn">Convite</a>
                <a href="mensagens.html" class="menu-btn">Deixe sua Mensagem</a>
                <a href="presentes.html" class="menu-btn">Lista de Presentes</a>
            </div>

            <!-- Easter egg: botão invisível sobre o Pippin e o poço (canto inferior direito) -->
            <button id="easter-egg-btn" aria-hidden="true" tabindex="-1"></button>
        </div>

        <!-- Overlay "Fool of a Took" -->
        <div id="fool-overlay" class="hidden">
            <div id="fool-text">
                <p class="fool-line-1">FOOL OF A TOOK</p>
                <p class="fool-line-2">throw yourself in next time</p>
                <p class="fool-line-3">and rid us of your stupidity</p>
            </div>
        </div>
    </div>

    <!-- Overlay da abertura -->
    <div id="opening-overlay">

        <!-- Porta dividida em duas metades para animação de abertura -->
        <div id="door-container">
            <!-- Efeito de brilho procedural das runas (dentro da porta) -->
            <div id="rune-glow-overlay"></div>
            <div id="rune-streaks"></div>
            <div id="door-left" class="door-half"></div>
            <div id="door-right" class="door-half"></div>
        </div>

        <!-- Frase de Gandalf -->
        <div id="phrase-container">
            <p id="phrase">
                "As Portas de Durin, Senhor de Moria.<br>
                Fale, <span class="phrase-highlight">amigo</span>, e entre."
            </p>
        </div>

        <!-- Input de senha -->
        <div id="input-container">
            <div id="input-wrapper">
                <input
                    type="text"
                    id="password-input"
                    autocomplete="off"
                    spellcheck="false"
                >
                <div id="fake-placeholder">
                    <span class="placeholder-highlight">amigo</span>
                </div>
            </div>
            <p id="error-message">
                "Esta não é a palavra certa. A porta permanece fechada."
            </p>
        </div>

    </div>

    <script src="js/opening.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
